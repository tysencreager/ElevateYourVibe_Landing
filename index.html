<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Energize Your Vibe | Empower Your Energy, Transform Your Life</title>

    <!-- Open Graph / Facebook / iMessage / SMS link previews -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Energize Your Vibe" />
    <meta property="og:url" content="https://energizeyourvibe.com/" />
    <meta property="og:title" content="Energize Your Vibe | Empower Your Energy, Transform Your Life" />
    <meta property="og:description" content="A transformational global sisterhood rooted in self-love, confidence, and authentic connection. We lead with love. We live with intention. We have fun." />
    <meta property="og:image" content="https://energizeyourvibe.com/eyv-social.png" />
    <meta property="og:image:secure_url" content="https://energizeyourvibe.com/eyv-social.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="2000" />
    <meta property="og:image:height" content="2000" />
    <meta property="og:image:alt" content="Energize Your Vibe" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Energize Your Vibe | Empower Your Energy, Transform Your Life" />
    <meta name="twitter:description" content="A transformational global sisterhood rooted in self-love, confidence, and authentic connection." />
    <meta name="twitter:image" content="https://energizeyourvibe.com/eyv-social.png" />
    <meta name="twitter:image:alt" content="Energize Your Vibe" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.cdnfonts.com/css/recoleta" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <!--
      Hidden form so Netlify can detect the subscribe form at build time.
      The live React form in the footer posts to "/" with the same field names.
    -->
    <form name="subscribe" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="email" name="email" />
      <input name="bot-field" />
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
